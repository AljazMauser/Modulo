version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: erp_postgres
    environment:
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
      POSTGRES_DB: erp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: erp_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://erp_user:erp_password@db:5432/erp_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app # Hot reload for development
    command: ["./start.sh"]

  frontend:
    build:
      context: ./frontend
    container_name: erp_frontend
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  postgres_data:
